<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玫瑰之城 · 生命剧本的重塑</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --rose:#C4687C; --rose-d:#8B2635; --rose-dd:#5C1622;
  --rose-l:#F2D5D9; --rose-p:#FFF8F5; --rose-m:#FAE8EA;
  --gold:#C9A96E; --gold-l:rgba(201,169,110,.15);
  --cream:#FAF0EB;
  --t1:#3D1A1A; --t2:#7A4A4A; --t3:#B89090;
  --white:#FFFFFF;
  --shadow:0 4px 24px rgba(139,38,53,.1);
}
html,body{min-height:100vh}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--rose-p);color:var(--t1);
  -webkit-font-smoothing:antialiased;
}

/* ─── Screens ─── */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.on{display:flex}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ─── Cover ─── */
#sCover{
  background:url('picture/微信图片_20260519115908_159_197.jpg') left center/cover no-repeat;
  justify-content:center; align-items:flex-end;
  padding:0 8% 0 0; animation:fi 1.2s ease;
}
.cover-box{
  max-width:380px; padding:60px 0;
  animation:su .9s ease .4s both;
}
.cover-en{font-size:11px;letter-spacing:4px;color:var(--t3);margin-bottom:18px;font-weight:500}
.cover-title{font-size:52px;font-weight:700;color:var(--t1);letter-spacing:-2px;line-height:1;margin-bottom:6px}
.cover-sub{font-size:17px;color:var(--t2);margin-bottom:28px;letter-spacing:1px}
.cover-desc{
  font-size:13px;color:var(--t3);line-height:2.2;margin-bottom:36px;
  padding-left:12px;border-left:2px solid var(--rose-l);
}
.btn-enter{
  padding:14px 40px;background:var(--rose-d);color:var(--white);
  border:none;border-radius:100px;font-size:15px;font-family:inherit;
  cursor:pointer;letter-spacing:2px;transition:all .3s;
}
.btn-enter:hover{background:var(--rose);transform:translateY(-2px);box-shadow:0 10px 28px rgba(139,38,53,.3)}

/* ─── Name Input ─── */
#sName{
  background:url('picture/微信图片_20260519115911_160_197.png') left bottom/45% no-repeat, var(--rose-p);
  justify-content:center;align-items:center;
  padding:40px 24px; animation:fi .5s ease;
}
.name-card{
  background:rgba(255,255,255,.92);backdrop-filter:blur(20px);
  border-radius:24px;padding:52px 44px;max-width:460px;width:100%;
  text-align:center;box-shadow:0 24px 64px rgba(139,38,53,.12);
  animation:su .6s ease .15s both;
}
.name-rose{font-size:36px;margin-bottom:18px}
.name-title{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.name-quote{font-size:13px;color:var(--t3);line-height:1.9;margin-bottom:32px}
.name-input{
  width:100%;padding:16px 20px;border:1.5px solid var(--rose-l);
  border-radius:14px;font-size:17px;font-family:inherit;color:var(--t1);
  background:var(--rose-p);outline:none;text-align:center;
  transition:border-color .2s;margin-bottom:10px;letter-spacing:1px;
}
.name-input:focus{border-color:var(--rose)}
.name-input::placeholder{color:var(--t3);font-size:15px;letter-spacing:0}
.privacy{font-size:12px;color:var(--t3);margin-bottom:26px;line-height:1.6}
.btn-start{
  width:100%;padding:15px;background:linear-gradient(135deg,var(--rose),var(--rose-d));
  color:var(--white);border:none;border-radius:14px;font-size:16px;
  font-family:inherit;cursor:pointer;letter-spacing:1px;transition:opacity .2s;
}
.btn-start:hover{opacity:.9}
.api-toggle{font-size:12px;color:var(--t3);cursor:pointer;margin-top:18px;padding:6px}
.api-toggle:hover{color:var(--t2)}
.api-panel{display:none;margin-top:12px;padding:16px;background:var(--rose-p);border-radius:12px;text-align:left}
.api-panel.on{display:block}
.api-tabs{display:flex;gap:8px;margin-bottom:10px}
.api-tab{
  flex:1;padding:9px 0;border:1.5px solid var(--rose-l);border-radius:8px;
  background:var(--white);font-size:13px;font-family:inherit;color:var(--t2);
  cursor:pointer;text-align:center;transition:all .2s;
}
.api-tab.sel{border-color:var(--rose);background:var(--rose-m);color:var(--rose-d);font-weight:600}
.api-input{
  width:100%;padding:10px 14px;border:1.5px solid var(--rose-l);border-radius:8px;
  font-size:13px;font-family:inherit;color:var(--t1);background:var(--white);
  outline:none;margin-bottom:8px;transition:border-color .2s;
}
.api-input:last-child{margin-bottom:0}
.api-input:focus{border-color:var(--rose)}
.api-lbl{font-size:11px;color:var(--t3);margin-bottom:5px;display:block}

/* ─── Transition ─── */
#sTrans{
  background:var(--rose-p);
  justify-content:center;align-items:center;
  animation:fi .4s ease;
}
.trans-wrap{text-align:center}
.trans-rose{font-size:52px;margin-bottom:28px;animation:bloom 3s ease infinite}
@keyframes bloom{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.06) rotate(3deg)}}
.trans-name{font-size:13px;color:var(--t3);letter-spacing:3px;margin-bottom:10px}
.trans-text{font-size:28px;color:var(--t1);font-weight:300;letter-spacing:2px;animation:breathe 2.5s ease infinite}
@keyframes breathe{0%,100%{opacity:.45}50%{opacity:1}}

/* ─── Chat ─── */
#sChat{background:var(--rose-p)}
.chat-hd{
  position:fixed;top:0;left:0;right:0;
  background:rgba(255,248,245,.88);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--rose-l);padding:12px 20px 10px;z-index:50;
}
.chat-hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ai-badge{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:var(--t1)}
.ai-pulse{width:8px;height:8px;background:#6FCF97;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.stage-lbl{font-size:11px;color:var(--t3);letter-spacing:.5px}
.stage-dots{display:flex;gap:5px;align-items:center}
.sd{width:8px;height:8px;border-radius:50%;background:var(--rose-l);transition:all .4s}
.sd.on{background:var(--rose);width:22px;border-radius:4px;box-shadow:0 0 8px rgba(196,104,124,.4)}
.sd.ok{background:var(--rose);opacity:.4}
.sd-names{display:flex;justify-content:space-between;margin-top:5px}
.sd-name{font-size:10px;color:var(--t3)}

.chat-body{flex:1;padding:96px 20px 120px;max-width:700px;margin:0 auto;width:100%}
.msgs{display:flex;flex-direction:column;gap:16px}

@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg{display:flex;gap:10px;animation:msgIn .28s ease}
.msg.u{flex-direction:row-reverse}
.av{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--rose-l),#F2D5D9);
  border:1px solid rgba(196,104,124,.2);
  display:flex;align-items:center;justify-content:center;font-size:17px;
}
.msg.u .av{background:linear-gradient(135deg,var(--rose),var(--rose-d));color:var(--white);font-size:12px;font-weight:700;border:none}
.bub{
  max-width:78%;padding:13px 17px;border-radius:18px;
  font-size:15px;line-height:1.8;
}
.msg.ai .bub{
  background:var(--white);border:1px solid var(--rose-l);
  border-radius:4px 18px 18px 18px;color:var(--t1);
  box-shadow:0 2px 12px rgba(139,38,53,.05);
}
.msg.u .bub{
  background:linear-gradient(135deg,var(--rose),var(--rose-d));
  color:var(--white);border-radius:18px 4px 18px 18px;
}
.chat-hint{font-size:12px;color:var(--t3);margin:4px 0 0 46px;font-style:italic;line-height:1.6}

/* ─── Stage Header (top of each page) ─── */
.stage-hdr{
  display:flex;align-items:center;justify-content:center;
  gap:8px;padding:20px 0 18px;
}
.stage-hdr-icon{font-size:20px}
.stage-hdr-name{font-size:12px;color:var(--t3);letter-spacing:2.5px;font-weight:500}
/* ─── History Banner ─── */
.hist-banner{
  position:fixed;top:70px;left:0;right:0;
  background:rgba(61,12,17,.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:#FAE8EA;padding:9px 20px;
  display:none;align-items:center;justify-content:space-between;
  font-size:13px;z-index:49;cursor:pointer;letter-spacing:.5px;
}
.hist-banner.vis{display:flex}
.hist-banner-ret{color:var(--gold);font-size:13px;white-space:nowrap;margin-left:12px}
/* ─── Back Button (left side, away from music button) ─── */
.back-btn{
  position:fixed;bottom:90px;left:16px;
  width:40px;height:40px;
  background:rgba(255,248,245,.92);border:1px solid var(--rose-l);
  border-radius:50%;display:none;align-items:center;justify-content:center;
  cursor:pointer;font-size:17px;
  box-shadow:0 2px 14px rgba(139,38,53,.13);
  z-index:48;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:all .2s;color:var(--rose-d);
}
.back-btn.vis{display:flex}
.back-btn:hover{background:var(--rose-l);transform:scale(1.08)}
.ld-wrap{display:flex;gap:10px}
.ld-bub{
  padding:14px 18px;background:var(--white);border:1px solid var(--rose-l);
  border-radius:4px 18px 18px 18px;display:flex;gap:5px;align-items:center;
}
.ld{width:7px;height:7px;border-radius:50%;background:var(--rose-l);animation:ld 1.4s infinite}
.ld:nth-child(2){animation-delay:.2s}.ld:nth-child(3){animation-delay:.4s}
@keyframes ld{0%,80%,100%{transform:translateY(0);background:var(--rose-l)}40%{transform:translateY(-5px);background:var(--rose)}}

.chat-ia{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,248,245,.92);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);border-top:1px solid var(--rose-l);padding:12px 20px;
}
.chat-ia-inner{max-width:700px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
.chat-ta{
  flex:1;padding:11px 16px;border:1.5px solid var(--rose-l);border-radius:14px;
  font-size:15px;font-family:inherit;color:var(--t1);background:var(--white);
  resize:none;outline:none;min-height:48px;max-height:140px;line-height:1.6;
  transition:border-color .2s;
}
.chat-ta:focus{border-color:var(--rose)}
.send-btn{
  width:48px;height:48px;background:linear-gradient(135deg,var(--rose),var(--rose-d));
  border:none;border-radius:14px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:opacity .2s;
}
.send-btn:hover{opacity:.9}.send-btn:disabled{opacity:.3;cursor:not-allowed}
.mic-btn{
  width:48px;height:48px;background:var(--white);
  border:1.5px solid var(--rose-l);border-radius:14px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:all .2s;
}
.mic-btn:hover{border-color:var(--rose);background:rgba(180,30,50,.05)}
.mic-btn.recording{background:rgba(180,30,50,.1);border-color:var(--rose);animation:pulse-mic 1s ease-in-out infinite}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 rgba(180,30,50,.3)}50%{box-shadow:0 0 0 7px rgba(180,30,50,0)}}

/* ─── Mantra Overlay ─── */
#mantraOv{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(20,3,8,.88);
  align-items:center;justify-content:center;padding:24px;
  animation:fi .5s ease;
}
#mantraOv.on{display:flex}
.mantra-card{
  background:linear-gradient(145deg,#3D0C11 0%,#6B1A28 100%);
  border:1px solid rgba(201,169,110,.25);border-radius:28px;
  padding:52px 44px;max-width:440px;width:100%;text-align:center;
  box-shadow:0 40px 100px rgba(0,0,0,.5);
  animation:su .5s ease;
}
.mantra-lbl{font-size:11px;color:rgba(201,169,110,.55);letter-spacing:4px;text-transform:uppercase;margin-bottom:20px}
.mantra-deco{font-size:28px;margin-bottom:16px;opacity:.65}
.mantra-txt{font-size:24px;font-weight:700;color:var(--gold);line-height:1.6;letter-spacing:3px;margin-bottom:32px;text-shadow:0 0 40px rgba(201,169,110,.25)}
.mantra-close{
  padding:12px 32px;background:rgba(201,169,110,.12);border:1px solid rgba(201,169,110,.3);
  color:var(--gold);border-radius:100px;font-size:14px;font-family:inherit;
  cursor:pointer;letter-spacing:1px;transition:background .2s;
}
.mantra-close:hover{background:rgba(201,169,110,.22)}
.mantra-save{
  display:block;margin:12px auto 0;padding:9px 24px;
  background:transparent;border:1px solid rgba(201,169,110,.2);
  color:rgba(201,169,110,.55);border-radius:100px;font-size:13px;font-family:inherit;
  cursor:pointer;letter-spacing:.5px;transition:all .2s;
}
.mantra-save:hover{border-color:rgba(201,169,110,.4);color:var(--gold)}

/* ─── Report ─── */
#sReport{
  background:url('picture/微信图片_20260519115913_161_197.png') center bottom/50% no-repeat, var(--rose-p);
  animation:fi .5s ease;
}
.report-wrap{max-width:660px;margin:0 auto;padding:56px 24px 80px;width:100%}
.report-hd{text-align:center;margin-bottom:40px}
.report-hd-ico{font-size:40px;margin-bottom:16px}
.report-hd-name{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.report-hd-sub{font-size:14px;color:var(--t3);margin-bottom:24px}
.report-divider{width:40px;height:2px;background:linear-gradient(90deg,var(--rose-l),var(--rose));margin:0 auto}
.report-section{background:rgba(255,255,255,.88);border:1px solid var(--rose-l);border-radius:18px;padding:26px;margin-bottom:14px;box-shadow:0 2px 16px rgba(139,38,53,.04)}
.report-section-title{font-size:12px;font-weight:700;color:var(--rose);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.report-body{font-size:15px;line-height:1.85;color:var(--t1)}
.report-body h2,.report-body h3{font-size:16px;font-weight:700;color:var(--rose-d);margin:20px 0 8px}
.report-body hr{border:none;border-top:1px solid var(--rose-l);margin:16px 0}
.report-body strong{color:var(--t1)}
.report-body li-item{display:flex;gap:8px;margin:8px 0;align-items:flex-start}
.report-acts{display:flex;flex-direction:column;gap:10px;margin-top:28px}
.r-btn{width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;border:none;letter-spacing:.3px}
.r-btn-p{background:linear-gradient(135deg,var(--rose),var(--rose-d));color:var(--white)}
.r-btn-p:hover{opacity:.9}
.r-btn-s{background:rgba(255,255,255,.8);color:var(--t1);border:1.5px solid var(--rose-l)}
.r-btn-s:hover{border-color:var(--rose)}

/* ─── Cache banner ─── */
.cache-bar{
  background:rgba(244,216,220,.5);border:1px solid var(--rose-l);
  border-radius:12px;padding:12px 16px;margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;font-size:13px;color:var(--t2);flex-wrap:wrap;gap:8px;
}
.cache-btns{display:flex;gap:6px}
.c-btn{padding:6px 14px;border-radius:100px;font-size:12px;font-family:inherit;cursor:pointer;border:none;font-weight:600}
.c-yes{background:var(--rose);color:var(--white)}
.c-no{background:var(--rose-l);color:var(--rose-d)}

/* ─── Toast ─── */
.toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--t1);color:var(--white);padding:10px 20px;
  border-radius:100px;font-size:13px;opacity:0;transition:all .3s;
  z-index:300;white-space:nowrap;pointer-events:none;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── Music Button ─── */
.music-btn{
  position:fixed;bottom:80px;right:20px;z-index:100;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,248,245,.88);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1.5px solid var(--rose-l);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;
  box-shadow:0 4px 16px rgba(139,38,53,.12);
  transition:all .2s;
}
.music-btn:hover{border-color:var(--rose);box-shadow:0 6px 20px rgba(196,104,124,.25)}
.music-btn.playing{border-color:var(--rose);background:var(--rose-m)}

@media(max-width:640px){
  #sCover{align-items:center;padding:40px 24px}
  .cover-box{text-align:center;max-width:100%}
  .cover-box .cover-desc{border-left:none;padding-left:0}
  .cover-title{font-size:40px}
  .name-card{padding:36px 24px}
  .bub{max-width:88%;font-size:14px}
  .mantra-card{padding:40px 28px}
  .mantra-txt{font-size:21px}
}
</style>
</head>
<body>

<!-- ── Cover ── -->
<div class="screen on" id="sCover">
  <div class="cover-box">
    <div class="cover-en">CITY OF ROSES</div>
    <div class="cover-title">玫瑰之城</div>
    <div class="cover-sub">生命剧本的重塑</div>
    <div class="cover-desc">
      一段 AI 引导的内在探索<br>
      约 20–30 分钟 &nbsp;·&nbsp; 完全私密
    </div>
    <button class="btn-enter" onclick="goName()">进入玫瑰城 →</button>
  </div>
</div>

<!-- ── Name Input ── -->
<div class="screen" id="sName">
  <div class="name-card">
    <div class="name-rose">🌹</div>
    <div class="name-title">欢迎来到属于你的玫瑰城</div>
    <div class="name-quote">用生命的体验，长出你的玫瑰<br>用昨日的泥沙，建当下的城池</div>
    <input class="name-input" id="iName" type="text" placeholder="请告诉我，我该如何称呼你？" maxlength="20" onkeydown="if(event.key==='Enter')doStart()">
    <div class="privacy">🔒 你的故事只存在于这次对话，不被任何人记录</div>
    <button class="btn-start" onclick="doStart()">开始探索</button>
    <div class="api-toggle" onclick="toggleApi()">⚙ API 设置</div>
    <div class="api-panel" id="apiPanel">
      <div class="api-tabs">
        <button class="api-tab" id="tabGM" onclick="selApi('gm')">Gemini 中转</button>
        <button class="api-tab sel" id="tabDS" onclick="selApi('ds')">DeepSeek</button>
      </div>
      <span class="api-lbl" style="margin-top:4px">飞书 Webhook（可选）</span>
      <input class="api-input" id="iFeishu" type="text" placeholder="https://open.feishu.cn/..." value="https://open.feishu.cn/open-apis/bot/v2/hook/6c2e4765-9a7c-4f51-873e-64e985f8faa5">
    </div>
  </div>
</div>

<!-- ── Transition ── -->
<div class="screen" id="sTrans">
  <div class="trans-wrap">
    <div class="trans-rose">🌹</div>
    <div class="trans-name" id="transName">WELCOME</div>
    <div class="trans-text" id="transText">你准备好了吗</div>
  </div>
</div>

<!-- ── Chat ── -->
<div class="screen" id="sChat">
  <div class="chat-hd">
    <div class="chat-hd-top">
      <div class="ai-badge"><div class="ai-pulse"></div>小赛 陪伴中</div>
      <div class="stage-lbl" id="stageLbl">场景收集</div>
    </div>
    <div class="stage-dots">
      <div class="sd on" id="sd1"></div>
      <div class="sd" id="sd2"></div>
      <div class="sd" id="sd3"></div>
      <div class="sd" id="sd4"></div>
    </div>
  </div>

  <div class="hist-banner" id="histBanner" onclick="returnToCurrent()">
    <span id="histBannerTxt">正在查看第一幕</span>
    <span class="hist-banner-ret">返回当前对话 →</span>
  </div>

  <div class="chat-body" id="chatBody">
    <div id="cacheBanner"></div>
    <div class="msgs" id="msgs"></div>
  </div>

  <button class="back-btn" id="backBtn" onclick="goBack()" title="返回上一幕">←</button>

  <div class="chat-ia">
    <div class="chat-ia-inner">
      <textarea class="chat-ta" id="chatTA" placeholder="在这里说说你的故事…" rows="1"
        onkeydown="onKey(event)" oninput="autoH(this)"></textarea>

async function callAI(messages) {
  const r = await fetch('/.netlify/functions/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ apiType: S.apiType, messages }),
  });
  if (!r.ok) {
    const e = await r.json().catch(()=>({}));
    throw new Error(e.error?.message || 'HTTP ' + r.status);
  }
  return (await r.json()).choices[0].message.content;

// ══ STAGE DETECTION ══════════════════════════════
const STAGE_KW = {
  2: ['渴望','冰山','底层藏着','呼唤的渴望','Yearnings'],
  3: ['童年','过去的时光','源代码','旧剧本','记忆中','轻轻触碰'],
  4: ['模式看见','现实转念','疗愈定锚','你看到了它们之间的联系','这个新的视角','你只是在重温'],
};
const STAGE_NAMES = ['场景收集','触碰渴望','源码回溯','整合转化'];
const STAGE_FULL  = [
  { icon:'🌊', act:'第一幕', title:'波澜', sub:'生存姿态' },
  { icon:'💎', act:'第二幕', title:'深海', sub:'期待与渴望' },
  { icon:'🕰', act:'第三幕', title:'回溯', sub:'旧日剧本' },
  { icon:'🌹', act:'第四幕', title:'唤醒', sub:'剧本重塑' },
];

function detectStage(text) {
  for (const s of [4,3,2]) {
    if (STAGE_KW[s].some(k => text.includes(k))) return s;
  }
  return S.stage;
}

function setStage(n) {
  if (n <= S.stage) return;
  S.stage = n;
  document.getElementById('stageLbl').textContent = STAGE_NAMES[n - 1];
  for (let i = 1; i <= 4; i++) {
    const d = document.getElementById('sd' + i);
    d.className = 'sd' + (i < n ? ' ok' : i === n ? ' on' : '');
  }
}

function addStageHeader(n) {
  const s = STAGE_FULL[n - 1] || {};
  const d = document.createElement('div');
  d.className = 'stage-hdr';
  d.innerHTML = `<span class="stage-hdr-icon">${s.icon||'✦'}</span><span class="stage-hdr-name">${s.act||''} · ${s.title||''}</span>`;
  document.getElementById('msgs').appendChild(d);
}

// Called when a live stage transition occurs (clears page, starts fresh)
function clearAndStartStage(n) {
  S.stageStart[n] = S.msgs.length - 1; // AI reply that opened this stage
  S.viewStage = n;
  document.getElementById('msgs').innerHTML = '';
  addStageHeader(n);
  document.getElementById('backBtn').classList.add('vis');
  document.getElementById('histBanner').classList.remove('vis');
  window.scrollTo({top: 0});
}

// Called for back/forward navigation (renders a specific stage read-only or live)
function showStage(n) {
  S.viewStage = n;
  document.getElementById('msgs').innerHTML = '';
  addStageHeader(n);

  const start = S.stageStart[n] || 0;
  const end   = S.stageStart[n + 1] !== undefined ? S.stageStart[n + 1] : S.msgs.length;
  S.msgs.slice(start, end)
    .filter(m => m.role !== 'system' && m.content !== '[开始]')
    .forEach((m, i) => addMsg(m.role, m.content, i === 0 && m.role === 'assistant'));

  const isCurrent = (n === S.stage);

  // History banner
  const hb = document.getElementById('histBanner');
  if (hb) {
    const sf = STAGE_FULL[n - 1] || {};
    document.getElementById('histBannerTxt').textContent = `${sf.act} · ${sf.title}`;
    hb.classList.toggle('vis', !isCurrent);
  }

  // Input state
  const disabled = !isCurrent || S.busy;
  const ta = document.getElementById('chatTA');
  const sb = document.getElementById('sendBtn');
  const mb = document.getElementById('micBtn');
  if (ta) { ta.disabled = disabled; ta.placeholder = isCurrent ? '在这里说说你的故事…' : '（正在查看历史记录）'; }
  if (sb) sb.disabled = disabled;
  if (mb) mb.disabled = disabled;

  // Back button: visible when not at stage 1
  document.getElementById('backBtn').classList.toggle('vis', n > 1);

  if (isCurrent) scroll(); else window.scrollTo({top: 0, behavior: 'smooth'});
}

// Rebuild stageStart boundaries from S.msgs (for cache restore)
function rebuildStageStarts() {
  S.stageStart = {1: 0};
  let cur = 1;
  S.msgs.forEach((m, i) => {
    if (m.role === 'assistant') {
      for (const s of [4,3,2]) {
        if (STAGE_KW[s].some(k => m.content.includes(k))) {
          if (s > cur) { S.stageStart[s] = i; cur = s; }
          break;
        }
      }
    }
  });
  S.viewStage = S.stage;
}

window.returnToCurrent = () => showStage(S.stage);

window.goBack = () => {
  if (S.viewStage <= 1) return;
  showStage(S.viewStage - 1);
};

function extractMantra(text) {
  const m = text.match(/===MANTRA_START===\s*([\s\S]*?)\s*===MANTRA_END===/);
  return m ? m[1].trim() : null;
}

window.downloadMantra = () => {
  const text = S.mantra || document.getElementById('mantraTxt').textContent;
  const btn = document.getElementById('mantraSaveBtn');
  btn.textContent = '生成中…'; btn.disabled = true;

  const W = 480, H = 360, DPR = 3;
  const cv = document.createElement('canvas');
  cv.width = W * DPR; cv.height = H * DPR;
  const ctx = cv.getContext('2d');
  ctx.scale(DPR, DPR);

  // rounded rect helper
  function rr(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }

  // background gradient — matches CSS exactly
  const bg = ctx.createLinearGradient(0, 0, W*0.7, H);
  bg.addColorStop(0, '#3D0C11'); bg.addColorStop(1, '#6B1A28');
  rr(0,0,W,H,28); ctx.fillStyle = bg; ctx.fill();

  // gold border
  rr(1,1,W-2,H-2,27);
  ctx.strokeStyle = 'rgba(201,169,110,0.25)'; ctx.lineWidth = 1; ctx.stroke();

  const font = '-apple-system,PingFang SC,Hiragino Sans GB,Microsoft YaHei,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // rose
  ctx.font = '38px serif'; ctx.fillStyle = '#fff';
  ctx.fillText('🌹', W/2, 74);

  // label
  ctx.font = `500 11px ${font}`; ctx.fillStyle = 'rgba(201,169,110,0.55)';
  ctx.fillText('你的专属曼特罗（Mantra）', W/2, 122);

  // mantra text with glow
  ctx.font = `bold 26px ${font}`; ctx.fillStyle = '#C9A96E';
  ctx.shadowColor = 'rgba(201,169,110,0.5)'; ctx.shadowBlur = 28;
  const maxW = W - 90, lineH = 42;
  const lines = [];
  let cur = '';
  for (const ch of text) {
    if (ctx.measureText(cur+ch).width > maxW) { lines.push(cur); cur = ch; }
    else cur += ch;
  }
  if (cur) lines.push(cur);
  let ty = H/2 - (lines.length-1)*lineH/2 + 14;
  for (const l of lines) { ctx.fillText(l, W/2, ty); ty += lineH; }
  ctx.shadowBlur = 0;

  const link = document.createElement('a');
  link.download = '我的专属曼特罗.png';
  link.href = cv.toDataURL('image/png');
  link.click();
  btn.textContent = '🌹 保存为图片'; btn.disabled = false;
};

window.closeMantra = () => {
  document.getElementById('mantraOv').classList.remove('on');

};

};

    .replace(/===MANTRA_START===[\s\S]*?===MANTRA_END===/g, '<span style="cursor:pointer;color:var(--gold);text-decoration:underline dotted" onclick="reopenMantra()">〔 ✦ 点击重看你的专属曼特罗 ✦ 〕</span>')
    .replace(/\n/g,'<br>')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/【(.*?)】/g,'<strong>【$1】</strong>');
}

function addMsg(role, text, hint) {
  const wrap = document.getElementById('msgs');
  const isAI = role === 'assistant';
  const d = document.createElement('div');
  d.className = 'msg ' + (isAI ? 'ai' : 'u');
  d.innerHTML = `<div class="av">${isAI ? '🌹' : S.name.slice(0,1)}</div>
    <div class="bub">${fmt(text)}</div>`;
  wrap.appendChild(d);
  if (hint) {
    const h = document.createElement('div');
    h.className = 'chat-hint';
    h.textContent = '比如：最近和某人的一场争吵 / 一件放不下的事 / 一种说不清楚的情绪…';
    wrap.appendChild(h);
  }
  scroll();
}

function showLoader() {
  const wrap = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = 'loader';
  d.innerHTML = `<div class="av">🌹</div>
    <div class="ld-bub"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>`;
  wrap.appendChild(d);
  scroll();
}

function hideLoader() { document.getElementById('loader')?.remove(); }

function scroll() { setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}),80); }

function reMsgs() {
  rebuildStageStarts();
  showStage(S.stage);
}

// ══ CONVERSATION ═════════════════════════════════
async function startConvo() {
  S.msgs = [
    { role:'system', content: buildSys(S.name) },
    { role:'user',   content: '[开始]' },
  ];
  S.stageStart = {1:0}; S.viewStage = 1; S.stage = 1;
  document.getElementById('msgs').innerHTML = '';
  addStageHeader(1);
  document.getElementById('backBtn').classList.remove('vis');
  document.getElementById('histBanner').classList.remove('vis');
  S.busy = true;
  document.getElementById('sendBtn').disabled = true;
  showLoader();
  try {
    const reply = await callAI(S.msgs);
    S.msgs.push({ role:'assistant', content: reply });
    hideLoader();
    addMsg('assistant', reply, true);
    setStage(detectStage(reply));
    saveCache();
  } catch(e) {
    hideLoader();
    toast('连接失败: ' + e.message);
    S.msgs = [];
  }
  S.busy = false;
  document.getElementById('sendBtn').disabled = false;
}

async function send() {
  const ta = document.getElementById('chatTA');
  const text = ta.value.trim();
  if (!text || S.busy) return;
  ta.value = ''; ta.style.height = '';
  S.msgs.push({ role:'user', content: text });
  addMsg('user', text);
  S.busy = true;
  document.getElementById('sendBtn').disabled = true;
  showLoader();
  try {
    const reply = await callAI(S.msgs);
    S.msgs.push({ role:'assistant', content: reply });
    hideLoader();

    // Detect mantra
    const mantra = extractMantra(reply);
    const hasReport = reply.includes('深潜实录') && reply.includes('建城图纸');
    if (mantra && !S.mantra) {
      S.mantra = mantra;
      document.getElementById('mantraTxt').textContent = mantra;
      if (hasReport) S._pendingReport = reply; // 报告等咒语关闭后再显示
      setTimeout(() => document.getElementById('mantraOv').classList.add('on'), 6500);
    }

    // Detect stage change
    const nextStage = detectStage(reply);
    const stageChanged = nextStage > S.stage;

    // Detect report (stage 5 — goes to report screen, no page-clear needed)
    if (hasReport) {
      if (stageChanged) setStage(nextStage);
      addMsg('assistant', reply);
      saveCache();
      if (!S._feishuSent) { S._feishuSent = true; sendFeishu(); }
      if (!mantra) setTimeout(() => buildReport(reply), 1200); // 无咒语时直接显示
      S.busy = false;
      document.getElementById('sendBtn').disabled = false;
      return;
    }

    // Stage transition: clear chat and start new page
    if (stageChanged) {
      setStage(nextStage);
      clearAndStartStage(nextStage);
    }

    addMsg('assistant', reply);
    saveCache();
  } catch(e) {
    hideLoader();
    toast('连接失败: ' + e.message);
    S.msgs.pop();
  }
  S.busy = false;
  document.getElementById('sendBtn').disabled = false;
}

// ══ REPORT ═══════════════════════════════════════
function fmtReport(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/===MANTRA_START===[\s\S]*?===MANTRA_END===/g,'')
    .replace(/^## (.*)/gm,'<h3 style="font-size:17px;font-weight:700;color:var(--rose-d);margin:20px 0 10px">$1</h3>')
    .replace(/^---$/gm,'<hr style="border:none;border-top:1px solid var(--rose-l);margin:18px 0">')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^- (.*)/gm,'<div style="margin:7px 0;padding:6px 10px 6px 14px;border-left:2px solid var(--rose-l);font-size:14px;line-height:1.7">$1</div>')
    .replace(/\n/g,'<br>');
}

function buildReport(text) {
  if (!S._feishuSent) { S._feishuSent = true; sendFeishu(); }
  document.getElementById('reportWrap').innerHTML = `
    <div class="report-hd">
      <div class="report-hd-ico">🌹</div>
      <div class="report-hd-name">${S.name}，你的玫瑰城档案</div>
      <div class="report-hd-sub">今天，你走过了一段很深的旅程</div>
      <div class="report-divider"></div>
    </div>
    <div class="report-section">
      <div class="report-body">${fmtReport(text)}</div>
    </div>
    <div class="report-acts">
      <button class="r-btn r-btn-p" onclick="copyReport()">📋 复制完整档案</button>
      <button class="r-btn r-btn-s" style="font-size:13px;color:var(--t3)" onclick="show('sChat')">← 返回对话</button>
    </div>`;
  show('sReport');
}

window.copyReport = () => {
  const lines = S.msgs.filter(m => m.role !== 'system' && m.content !== '[开始]')
    .map(m => (m.role === 'assistant' ? '小赛：' : S.name + '：') + m.content)
    .join('\n\n');
  navigator.clipboard.writeText(lines).then(() => toast('已复制到剪贴板 ✓')).catch(() => toast('请手动选择文字复制'));
};

// ══ FEISHU ═══════════════════════════════════════
async function sendFeishu() {
  const webhooks = [
    'https://open.feishu.cn/open-apis/bot/v2/hook/7f50eb68-1a6f-4d01-91e4-070d9c7c2bca',
    'https://open.feishu.cn/open-apis/bot/v2/hook/6c2e4765-9a7c-4f51-873e-64e985f8faa5',
    'https://open.feishu.cn/open-apis/bot/v2/hook/05f10434-2786-4f51-a08c-23b3012a4cda',
  ];
  const body = S.msgs.filter(m => m.role !== 'system' && m.content !== '[开始]')
    .map(m => (m.role === 'assistant' ? '小赛' : S.name) + '：' + m.content)
    .join('\n\n');
  const text = `🌹 玫瑰之城对话记录\n学员：${S.name}\n时间：${new Date().toLocaleString('zh-CN')}\n\n${body}`.slice(0, 3900);
  try {
    await Promise.all(webhooks.map(url => fetch(url, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ msg_type:'text', content:{ text } }),
    })));
    toast('已发送到飞书 ✓');
  } catch(e) { toast('发送失败'); }
}
window.sendFeishu = sendFeishu;

// ══ NAV ══════════════════════════════════════════
window.goName = () => { show('sName'); startMusic(); };

window.doStart = () => {
  const name = document.getElementById('iName').value.trim();
  if (!name) { toast('请告诉我你的名字'); return; }
  const feishu = document.getElementById('iFeishu').value.trim();
  S.name = name; S.feishu = feishu || CFG.feishu;

  // Transition
  document.getElementById('transName').textContent = name.toUpperCase();
  document.getElementById('transText').textContent = name + '，你准备好了吗';
  show('sTrans');

  setTimeout(() => {
    show('sChat');
    const cached = loadCache(name);
    if (cached?.msgs?.length > 2) {
      showCacheBanner(cached);
    } else {
      startConvo();
    }
  }, 3000);
};

window.toggleApi = () => document.getElementById('apiPanel').classList.toggle('on');

window.selApi = (t) => {
  S.apiType = t;
  document.getElementById('tabGM').classList.toggle('sel', t === 'gm');
  document.getElementById('tabDS').classList.toggle('sel', t === 'ds');
};

// ══ MUSIC ════════════════════════════════════════
function startMusic() {
  const audio = document.getElementById('bgMusic');
  const btn = document.getElementById('musicBtn');
  if (!audio.paused) return;
  audio.volume = 0.25;
  audio.play().then(() => {
    btn.textContent = '🔇';
    btn.classList.add('playing');
  }).catch(() => {});
}

window.toggleMusic = () => {
  const audio = document.getElementById('bgMusic');
  const btn = document.getElementById('musicBtn');
  if (audio.paused) {
    audio.volume = 0.25;
    audio.play().then(() => {
      btn.textContent = '🔇';
      btn.classList.add('playing');
    }).catch(() => toast('请将 music.mp3 放入页面同级目录'));
  } else {
    audio.pause();
    btn.textContent = '🎵';
    btn.classList.remove('playing');
  }
};

window.onKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
window.autoH = (el) => { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; };
window.send = send;

// ══ CACHE BANNER ═════════════════════════════════
function showCacheBanner(c) {
  S._cache = c;
  document.getElementById('cacheBanner').innerHTML = `
    <div class="cache-bar">
      <span>🌹 检测到今天未完成的对话，是否继续？</span>
      <div class="cache-btns">
        <button class="c-btn c-yes" onclick="restoreCache()">继续</button>
        <button class="c-btn c-no" onclick="clearBanner()">重新开始</button>
      </div>
    </div>`;
}

window.restoreCache = () => {
  const c = S._cache;
  S.msgs = c.msgs; S.stage = c.stage; S.mantra = c.mantra || '';
  setStage(S.stage);
  document.getElementById('cacheBanner').innerHTML = '';
  rebuildStageStarts();
  showStage(S.stage);
};

window.clearBanner = () => {
  document.getElementById('cacheBanner').innerHTML = '';
  startConvo();
};

// ─── 讯飞语音识别 ───
(function(){
  // 讯飞密钥已移至后端，前端只请求签名后的 URL

  const btn = () => document.getElementById('micBtn');
  let active = false, ws = null, audioCtx = null, mediaStream = null, processor = null, source = null;
  let resultText = '', frameStatus = 0, stopTimer = null, lastSegLen = 0;

  // 从后端获取签名后的 WebSocket URL（密钥不暴露到前端）
  async function buildWsUrl() {
    const resp = await fetch('/.netlify/functions/xf-auth');
    if (!resp.ok) throw new Error('获取语音授权失败');
    const { url, appId } = await resp.json();
    _appId = appId;
    return url;
  }
  let _appId = '';

  // Float32 → Int16 PCM → Base64
  function pcmBase64(f32) {
    const i16 = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++)
      i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32767));
    const bytes = new Uint8Array(i16.buffer);
    let s = '';
    for (let i = 0; i < bytes.length; i += 8192)
      s += String.fromCharCode(...bytes.subarray(i, i + 8192));
    return btoa(s);
  }

  // 降采样到 16000Hz
  function resample(buf, fromRate) {
    if (fromRate === 16000) return buf;
    const out = new Float32Array(Math.floor(buf.length * 16000 / fromRate));
    const ratio = fromRate / 16000;
    for (let i = 0; i < out.length; i++) out[i] = buf[Math.round(i * ratio)];
    return out;
  }

  function stopAll() {
    active = false;
    clearTimeout(stopTimer);
    if (processor) { try { processor.disconnect(); } catch(e){} processor = null; }
    if (source)    { try { source.disconnect(); }    catch(e){} source = null; }
    if (audioCtx)  { try { audioCtx.close(); }       catch(e){} audioCtx = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    if (ws && ws.readyState < 2) { try { ws.close(); } catch(e){} }
    ws = null;
    const b = btn();
    if (b) { b.textContent = '🎤'; b.classList.remove('recording'); }
  }

  function sendEnd() {
    if (ws && ws.readyState === 1)
      ws.send(JSON.stringify({data:{status:2, format:'audio/L16;rate=16000', encoding:'raw', audio:''}}));
  }

  async function start() {
    try {
      const url = await buildWsUrl();
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {channelCount:1, echoCancellation:true, noiseSuppression:true}
      });
      // 尝试直接以 16000Hz 创建，避免手动降采样失真
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 16000});
      } catch(e) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      await audioCtx.resume(); // iOS Safari 需要手动唤醒
      source    = audioCtx.createMediaStreamSource(mediaStream);
      processor = audioCtx.createScriptProcessor(4096, 1, 1);
      frameStatus = 0; lastSegLen = 0;

      ws = new WebSocket(url);

      ws.onopen = () => {
        toast('🎤 已连接，请说话…');
        source.connect(processor);
        processor.connect(audioCtx.destination);
        processor.onaudioprocess = (e) => {
          if (!ws || ws.readyState !== 1) return;
          const raw   = e.inputBuffer.getChannelData(0);
          // 若 AudioContext 已是 16000Hz 则直接用，否则降采样
          const pcm   = audioCtx.sampleRate === 16000 ? raw : resample(raw, audioCtx.sampleRate);
          const audio = pcmBase64(pcm);
          const msg   = { data: { status: frameStatus ? 1 : 0, format:'audio/L16;rate=16000', encoding:'raw', audio } };
          if (!frameStatus) {
            msg.common   = { app_id: _appId };
            msg.business = { language:'zh_cn', domain:'iat', accent:'mandarin', vad_eos:5000 };
            frameStatus  = 1;
          }
          ws.send(JSON.stringify(msg));
        };
        // 最长60秒自动停止
        stopTimer = setTimeout(() => { sendEnd(); setTimeout(stopAll, 800); }, 60000);
      };

      ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        if (d.code !== 0) { toast('识别出错 ' + d.code + (d.message ? ':'+d.message : '')); stopAll(); return; }
        if (d.data?.result?.ws) {
          const seg = d.data.result.ws.map(w => w.cw.map(c => c.w).join('')).join('');
          // pgs=rpl 表示替换上一段，pgs=apd 表示追加
          if (d.data.result.pgs === 'rpl') {
            resultText = resultText.slice(0, resultText.length - lastSegLen) + seg;
          } else {
            resultText += seg;
          }
          lastSegLen = seg.length;
          const ta = document.getElementById('chatTA');
          ta.value = resultText;
          autoH(ta);
        }
        if (d.data?.status === 2) stopAll();
      };

      ws.onerror = () => { /* 等 onclose 显示详细原因 */ };
      ws.onclose = () => { stopAll(); };

    } catch(err) {
      toast(err.name === 'NotAllowedError' ? '请允许麦克风权限后重试' : '语音启动失败：' + err.message);
      stopAll();
    }
  }

  window.toggleMic = () => {
    if (active) { sendEnd(); setTimeout(stopAll, 600); return; }
    if (location.protocol === 'file:') { toast('请通过网址访问，本地文件不支持语音'); return; }
    // 保留已有文字，继续追加新段落
    resultText = document.getElementById('chatTA').value;
    active = true;
    const b = btn();
    if (b) { b.textContent = '🔴'; b.classList.add('recording'); }
    start();
  };
})();
</script>
